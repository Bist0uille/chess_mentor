<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chess Mentor</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png" />
  <link rel="apple-touch-icon" href="/static/icon-180.png" />
  <meta name="theme-color" content="#1e1e1e" />
  <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />
  <style>
    :root {
      --bg: #1e1e1e; --panel: #2a2a2a; --panel2: #242424; --border: #383838;
      --text: #e8e8e8; --muted: #9a9a9a; --green: #6a9a4a; --green-d: #5a8a3c;
      --amber: #d8a657; --red: #e5534b;
    }
    * { box-sizing: border-box; }
    @keyframes cmfade { from { opacity: 0; } to { opacity: 1; } }
    #overlay line, #overlay circle, #overlay rect { animation: cmfade .18s ease-out; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
    }
    .app { max-width: 1000px; margin: 0 auto; padding: 18px 20px 40px; }
    .brand {
      font-size: 1.7rem; color: var(--text); letter-spacing: -.01em;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin: 6px 0 8px;
    }
    .brand b { color: var(--text); font-weight: 700; }
    #status {
      font-size: 1.3rem; font-weight: 700; margin: 2px 0 10px;
      min-height: 2.4em;          /* place réservée : le texte n'décale pas l'échiquier */
      display: flex; align-items: center; letter-spacing: -.01em;
    }
    #status.ok { color: var(--green); }
    #status.ko { color: var(--red); }

    .grid { display: grid; grid-template-columns: auto minmax(0, 1fr); gap: 26px; align-items: start; }
    .left { width: min(480px, 100%); display: flex; flex-direction: column; gap: 12px; }

    .meta { font-size: .92rem; color: var(--muted); }
    .meta b { color: var(--text); }
    .progress { font-size: .82rem; color: var(--muted); margin-top: -6px; }

    .boardrow { display: flex; align-items: stretch; gap: 10px; }
    .evalcol { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .evalbar {
      width: 16px; flex: 1; background: #111; border: 1px solid var(--border);
      border-radius: 8px; position: relative; overflow: hidden;
    }
    .evalbar::after {  /* repère central */
      content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 1px;
      background: var(--green); opacity: .5;
    }
    .evalfill {
      position: absolute; left: 0; right: 0; bottom: 0; height: 50%;
      background: #e9e9e9; transition: height .25s;
    }
    .evalnum { font-size: .72rem; color: var(--muted); min-width: 40px; text-align: center; }
    #board { width: min(440px, 82vw); touch-action: none; }
    #board * { touch-action: none; }  /* glisser une pièce ne fait pas défiler la page */

    .toolbar { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      padding: 9px 14px; border-radius: 8px; cursor: pointer; font-size: .92rem;
      border: 1px solid var(--border); background: var(--panel); color: var(--text);
      transition: background .15s, border-color .15s;
    }
    .btn:hover { border-color: var(--green); }
    .btn.primary { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
    .btn.primary:hover { background: var(--green-d); }
    .level { font-size: .85rem; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .level select {
      padding: 7px 9px; border-radius: 8px; background: var(--panel); color: var(--text);
      border: 1px solid var(--border);
    }

    .controls { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .cgroup { display: flex; gap: 6px; }
    .ibtn {
      padding: 8px 11px; border-radius: 8px; cursor: pointer; font-size: 1.15rem;
      line-height: 1; border: 1px solid var(--border); background: var(--panel); color: var(--text);
    }
    .ibtn:hover:not(:disabled) { border-color: var(--green); }
    .ibtn:disabled { opacity: .35; cursor: default; }
    .ibtn.primary { background: var(--green); border-color: var(--green); }

    .themes { font-size: .82rem; color: var(--muted); line-height: 1.55; margin-top: 14px; }
    .themes b { color: var(--text); }

    .panel { min-width: 0; display: flex; flex-direction: column; gap: 10px; }
    .intro { color: var(--muted); font-size: .9rem; margin: 4px 0 2px; line-height: 1.5; }
    .intro b { color: var(--text); }

    .hints { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .hints li {
      background: var(--panel); border: 1px solid var(--border); border-left: 3px solid var(--amber);
      padding: 11px 14px; border-radius: 8px; line-height: 1.5; font-size: .95rem;
    }
    .hints li b { color: var(--amber); }

    .refute {
      background: #3a201e; border: 1px solid #5a2a26; border-left: 3px solid var(--red);
      padding: 11px 14px; border-radius: 8px; font-size: .92rem; line-height: 1.5;
    }
    .refute b { color: #ff8a80; }
    .refute.analysis { background: #20303a; border-color: #345; border-left-color: #6fa8d0; }
    .refute.analysis b { color: #a9d3ef; }

    .movelog { display: flex; flex-direction: column; gap: 6px; }
    .mvlabel { font-size: .8rem; color: var(--muted); }
    .mv {
      background: #1f2e1a; border: 1px solid #34481f; border-left: 3px solid var(--green);
      padding: 9px 12px; border-radius: 8px; font-size: .9rem; line-height: 1.45;
    }
    .mv.cur { background: #27381f; box-shadow: 0 0 0 1px var(--green) inset; }

    .linewrap { margin-top: 4px; }
    .linelabel { font-size: .8rem; color: var(--muted); margin-bottom: 4px; }
    .line {
      font-family: ui-monospace, "SF Mono", Menlo, monospace; background: var(--panel2);
      border: 1px solid var(--border); padding: 10px 12px; border-radius: 8px; font-size: .92rem;
    }

    .promo {
      position: fixed; z-index: 40; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px; box-shadow: 0 8px 24px #0008; display: none;
    }
    .promo .plabel { font-size: .75rem; margin-bottom: 6px; color: var(--muted); }
    .promo button {
      display: block; width: 100%; text-align: left; margin: 3px 0; padding: 7px 12px;
      border-radius: 6px; border: 1px solid var(--border); background: var(--panel2);
      color: var(--text); cursor: pointer; font-size: .92rem;
    }
    .promo button:hover { border-color: var(--green); }

    .fbopen {
      margin-top: 16px; align-self: flex-start; background: none; color: var(--muted);
      border: 1px solid var(--border); padding: 7px 12px; border-radius: 8px;
      cursor: pointer; font-size: .85rem;
    }
    .fbopen:hover { border-color: var(--green); color: var(--text); }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; padding: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px; width: min(420px, 100%); display: flex; flex-direction: column; gap: 12px;
    }
    .modal-title { font-weight: 700; font-size: 1.1rem; }
    .fbvotes { display: flex; gap: 8px; }
    .fbvote {
      font-size: 1.3rem; padding: 6px 14px; border-radius: 8px; cursor: pointer;
      background: var(--bg); border: 1px solid var(--border);
    }
    .fbvote.sel { border-color: var(--green); background: #20301c; }
    .modal textarea {
      width: 100%; resize: vertical; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; padding: 10px; font: inherit;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .fbbtn {
      padding: 8px 16px; border-radius: 8px; cursor: pointer; color: var(--text);
      background: var(--bg); border: 1px solid var(--border);
    }
    .fbbtn.primary { background: var(--green); border-color: var(--green); }
    .fbthanks { color: var(--green); font-weight: 600; text-align: center; }

    @media (max-width: 820px) {
      .app { padding: 14px 12px 36px; }
      .grid { grid-template-columns: 1fr; gap: 16px; }
      .left { width: 100%; align-items: center; }
      .evalcol { display: none; }                 /* barre d'éval masquée → plus de place */
      .boardrow { width: fit-content; margin-inline: auto; }
      #board { width: min(480px, 92vw); }         /* échiquier plein, centré */
      .controls, .level { width: 100%; }
      .level { justify-content: center; }
      #status { font-size: 1.2rem; justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="brand"><img src="/static/favicon.svg" alt="" width="32" height="32"
         style="display:block;border-radius:7px" /> <b>Chess Mentor</b></div>
    <h1 id="status"></h1>

    <div class="grid">
      <section class="left">
        <div class="meta" id="meta">Chargement…</div>

        <div class="boardrow">
          <div class="evalcol">
            <div class="evalbar" id="evalbar"><div class="evalfill" id="evalfill"></div></div>
            <div class="evalnum" id="evalnum">—</div>
          </div>
          <div id="board"></div>
        </div>

        <div class="controls">
          <span class="cgroup">
            <button id="hint" class="ibtn primary" title="Indice">💡</button>
            <button id="solution" class="ibtn" title="Voir la solution">👁️</button>
          </span>
          <span class="cgroup">
            <button id="navStart" class="ibtn" title="Position de départ">«</button>
            <button id="navPrev" class="ibtn" title="Coup précédent">◀</button>
            <button id="navNext" class="ibtn" title="Coup suivant">▶</button>
            <button id="navEnd" class="ibtn" title="Dernière position">»</button>
            <button id="new" class="ibtn" title="Nouveau puzzle">🔄</button>
          </span>
        </div>
        <label class="level">Niveau
          <select id="level">
            <option value="600-1000">Débutant (600–1000)</option>
            <option value="1000-1400" selected>Intermédiaire (1000–1400)</option>
            <option value="1400-1800">Avancé (1400–1800)</option>
            <option value="1800-2200">Expert (1800–2200)</option>
          </select>
        </label>

        <div class="themes" id="themes"></div>

        <button id="fbOpen" class="fbopen" type="button">💬 Un retour ?</button>

        <div id="promo" class="promo">
          <div class="plabel">Promotion :</div>
          <button data-p="q">♛ Dame</button>
          <button data-p="r">♜ Tour</button>
          <button data-p="b">♝ Fou</button>
          <button data-p="n">♞ Cavalier</button>
        </div>
      </section>

      <section class="panel">
        <div id="refute" class="refute" style="display:none"></div>
        <div id="movelog" class="movelog" style="display:none"></div>
        <ol class="hints" id="hints"></ol>
        <div id="lineWrap" class="linewrap" style="display:none">
          <div class="linelabel">Ligne solution</div>
          <div class="line" id="line"></div>
        </div>
      </section>
    </div>
  </div>

  <div id="fbModal" class="modal" style="display:none">
    <div class="modal-card">
      <div class="modal-title">Ton retour</div>
      <div class="fbvotes">
        <button id="fbUp" class="fbvote" type="button" data-v="up" title="J'aime">👍</button>
        <button id="fbDown" class="fbvote" type="button" data-v="down" title="À améliorer">👎</button>
      </div>
      <textarea id="fbText" rows="4" placeholder="Une remarque, un bug, une idée d'amélioration…"></textarea>
      <div class="modal-actions">
        <button id="fbCancel" class="fbbtn" type="button">Annuler</button>
        <button id="fbSend" class="fbbtn primary" type="button">Envoyer</button>
      </div>
      <div id="fbThanks" class="fbthanks" style="display:none">Merci ! 🙏</div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="/static/engine.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
